<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Watchlist</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    /* ── CSS Variables ── */
    :root {
      --accent:     #d57455;
      --bg:         #1e1e1d;
      --card-bg:    #2a2a29;
      --input-bg:   #242423;
      --text:       #c3c2b7;
      --text-muted: #7a7970;
      --border:     #333332;
      --hover-card: #313130;
    }
    body.light-mode {
      --bg:         #f5f4ef;
      --card-bg:    #ffffff;
      --input-bg:   #ebebeb;
      --text:       #2a2a27;
      --text-muted: #888880;
      --border:     #deded8;
      --hover-card: #f0efe9;
    }

    /* ── Reset / Base ── */
    *, *::before, *::after { box-sizing: border-box; transition: background-color 0.2s, color 0.2s; }
    body { background: var(--bg); color: var(--text); min-height: 100vh; font-family: 'Segoe UI', system-ui, sans-serif; margin: 0; }

    /* ── Cards ── */
    .card {
      background: var(--card-bg); border-radius: 16px; overflow: hidden;
      cursor: pointer; display: flex; flex-direction: column;
      transition: transform 0.2s, box-shadow 0.2s, background-color 0.2s;
    }
    .card:hover { transform: translateY(-4px); box-shadow: 0 12px 32px rgba(0,0,0,0.28); background: var(--hover-card); }
    .poster-container { aspect-ratio: 2/3; overflow: hidden; background: var(--input-bg); flex-shrink: 0; }
    .poster-container img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .poster-placeholder {
      width: 100%; height: 100%; display: flex; align-items: center;
      justify-content: center; font-size: 2.5rem; color: var(--text-muted);
    }
    .card-body { padding: 10px 11px 11px; display: flex; flex-direction: column; gap: 4px; flex: 1; }
    .card-title {
      font-weight: 700; font-size: 0.86rem; color: var(--text);
      overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
      line-height: 1.3;
    }
    .card-meta { display: flex; align-items: center; gap: 5px; flex-wrap: wrap; margin-top: 1px; }
    .card-year { font-size: 0.74rem; color: var(--text-muted); }
    .card-desc {
      font-size: 0.71rem; color: var(--text-muted); line-height: 1.45; margin-top: 3px;
      overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
    }
    .card-genres { display: flex; flex-wrap: wrap; gap: 3px; margin-top: 3px; }
    .card-stars  { font-size: 0.78rem; margin-top: auto; padding-top: 5px; }

    /* ── Genre tags ── */
    .genre-tag {
      font-size: 0.62rem; padding: 2px 7px; border-radius: 99px;
      background: rgba(195,194,183,0.1); color: var(--text-muted);
      white-space: nowrap; border: 1px solid var(--border);
    }
    .genre-tag-lg { font-size: 0.72rem; padding: 3px 10px; }

    /* ── Badges ── */
    .badge { font-size: 0.67rem; padding: 2px 7px; border-radius: 99px; font-weight: 600; display: inline-block; white-space: nowrap; }
    .badge-finished { background: rgba(34,197,94,0.15);  color: #22c55e; }
    .badge-watching { background: rgba(213,116,85,0.15); color: var(--accent); }
    .badge-movie    { background: rgba(99,102,241,0.15); color: #818cf8; }

    /* ── Inputs ── */
    .input-field {
      background: var(--input-bg); color: var(--text); border: 1px solid var(--border);
      border-radius: 12px; padding: 10px 14px; width: 100%; outline: none;
      font-size: 0.9rem; height: 42px; font-family: inherit;
    }
    .input-field:focus { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(213,116,85,0.15); }
    select.input-field { cursor: pointer; }
    select option { background: var(--card-bg); color: var(--text); }

    /* ── Buttons ── */
    .btn-primary {
      background: var(--accent); color: #fff; font-weight: 600; border: none;
      border-radius: 12px; cursor: pointer; transition: opacity 0.15s, transform 0.1s;
      font-family: inherit; font-size: 0.9rem;
    }
    .btn-primary:hover { opacity: 0.88; transform: translateY(-1px); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .btn-secondary {
      background: var(--card-bg); color: var(--text); border: 1px solid var(--border);
      border-radius: 12px; cursor: pointer; transition: background 0.15s;
      font-family: inherit; font-size: 0.9rem;
    }
    .btn-secondary:hover { background: var(--hover-card); }
    .btn-icon {
      background: var(--card-bg); border: 1px solid var(--border); color: var(--text);
      width: 42px; height: 42px; border-radius: 12px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s; flex-shrink: 0;
    }
    .btn-icon:hover { background: var(--hover-card); }
    .btn-close-x {
      background: none; border: none; color: var(--text-muted); font-size: 1.15rem;
      cursor: pointer; line-height: 1; padding: 4px; border-radius: 8px; flex-shrink: 0;
      transition: color 0.15s, background 0.15s;
    }
    .btn-close-x:hover { color: var(--text); background: var(--input-bg); }
    .btn-danger-sm {
      background: rgba(239,68,68,0.1); color: #ef4444;
      border: 1px solid rgba(239,68,68,0.25); border-radius: 12px;
      padding: 10px 14px; cursor: pointer; font-size: 0.9rem;
      transition: background 0.15s;
    }
    .btn-danger-sm:hover { background: rgba(239,68,68,0.2); }

    /* ── Filter bar ── */
    .filter-bar { display: flex; gap: 10px; align-items: center; margin-bottom: 24px; }
    .filter-search { flex: 1 1 0; min-width: 0; }
    .filter-select { flex: 0 0 140px; width: 140px; }
    @media (max-width: 540px) {
      .filter-bar { flex-wrap: wrap; }
      .filter-search { flex: 1 1 100%; }
      .filter-select { flex: 1 1 calc(50% - 5px); width: auto; }
    }

    /* ── Modal overlay ── */
    .modal-overlay {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.72);
      backdrop-filter: blur(5px); z-index: 50; align-items: center;
      justify-content: center; padding: 16px;
    }
    .modal-overlay.active { display: flex; }

    /* Detail modal box */
    .modal-box-detail {
      background: var(--card-bg); border-radius: 22px; width: 100%;
      max-width: 680px; max-height: 92vh; overflow: hidden;
      display: flex; flex-direction: column;
    }

    /* Detail layout: poster left, info right on desktop; stacked on mobile */
    .detail-layout {
      display: flex; flex-direction: row; overflow: hidden; max-height: 92vh;
    }
    .detail-poster-wrap {
      flex: 0 0 220px; background: var(--input-bg); overflow: hidden;
    }
    .detail-poster-img {
      width: 100%; height: 100%; object-fit: cover; display: block;
    }
    .detail-poster-placeholder {
      width: 100%; height: 100%; min-height: 320px;
      display: flex; align-items: center; justify-content: center;
      font-size: 4rem; color: var(--text-muted);
    }
    .detail-info {
      flex: 1; padding: 24px 22px 22px; overflow-y: auto;
      display: flex; flex-direction: column; gap: 10px;
    }
    .detail-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
    .detail-title  { font-size: 1.25rem; font-weight: 800; color: var(--text); line-height: 1.25; margin: 0; }
    .detail-meta   { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .detail-year   { font-size: 0.88rem; color: var(--text-muted); font-weight: 600; }
    .detail-genres { display: flex; flex-wrap: wrap; gap: 5px; }
    .detail-overview {
      font-size: 0.85rem; color: var(--text-muted); line-height: 1.6;
      margin: 0; flex: 1;
    }
    .no-desc { font-style: italic; opacity: 0.5; }
    .detail-rating { display: flex; align-items: center; gap: 8px; }
    .rating-label  { font-size: 0.82rem; color: var(--text-muted); }
    .detail-actions { display: flex; gap: 8px; margin-top: 4px; }
    .detail-btn { flex: 1; padding: 11px; font-size: 0.88rem; }

    @media (max-width: 520px) {
      .detail-layout { flex-direction: column; }
      .detail-poster-wrap { flex: 0 0 auto; max-height: 240px; }
      .detail-poster-placeholder { min-height: 160px; }
      .detail-info { padding: 16px; }
      .detail-title { font-size: 1.1rem; }
    }

    /* Edit / Login modal box */
    .modal-box-form {
      background: var(--card-bg); border-radius: 20px; width: 100%;
      max-width: 420px; max-height: 92vh; overflow-y: auto; padding: 26px;
    }
    .edit-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .edit-title  { font-size: 1.15rem; font-weight: 700; color: var(--text); margin: 0; }
    .edit-actions { display: flex; gap: 10px; margin-top: 20px; }
    .form-label  { display: block; margin-bottom: 5px; font-size: 0.8rem; color: var(--text-muted); }
    .toggle-row  { display: flex; gap: 24px; margin-bottom: 16px; }
    .toggle-label { display: flex; align-items: center; gap: 8px; cursor: pointer; font-size: 0.9rem; }
    .rating-hint { font-size: 0.82rem; color: var(--text-muted); margin-top: 4px; margin-bottom: 18px; }
    .mr-icon     { margin-right: 6px; }

    /* ── Stars ── */
    .star-row { display: flex; gap: 4px; }
    .star-btn {
      font-size: 1.6rem; cursor: pointer; color: var(--border);
      background: none; border: none; padding: 0;
      transition: color 0.1s, transform 0.1s;
    }
    .star-btn.active { color: #f5c518; }
    .star-btn:hover  { transform: scale(1.2); }

    /* ── Toggle switch ── */
    .toggle-switch { position: relative; width: 44px; height: 24px; display: inline-block; }
    .toggle-switch input { opacity: 0; width: 0; height: 0; }
    .toggle-track { position: absolute; inset: 0; background: var(--border); border-radius: 99px; cursor: pointer; transition: background 0.2s; }
    .toggle-track::before { content:''; position:absolute; height:18px; width:18px; left:3px; bottom:3px; background:#fff; border-radius:50%; transition:transform 0.2s; }
    input:checked + .toggle-track { background: var(--accent); }
    input:checked + .toggle-track::before { transform: translateX(20px); }

    /* ── Misc ── */
    .empty-state { text-align: center; padding: 80px 20px; color: var(--text-muted); }
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }
  </style>
</head>
<body>
<div class="max-w-7xl mx-auto px-4 py-6 md:px-6">

  <!-- Header -->
  <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-8">
    <div>
      <h1 class="text-3xl font-bold" style="color:var(--text)">My Watchlist</h1>
      <p id="count" style="color:var(--text-muted);font-size:0.9rem;margin-top:2px;">Loading…</p>
    </div>
    <div class="flex flex-wrap gap-2 items-center" id="headerBtns"></div>
  </div>

  <!-- Filter bar -->
  <div class="filter-bar">
    <input id="searchInput" placeholder="Search series or movies…" class="input-field filter-search" oninput="filterData()">
    <select id="categoryFilter" onchange="filterData()" class="input-field filter-select">
      <option value="">All Categories</option>
    </select>
    <select id="sortSelect" onchange="filterData()" class="input-field filter-select">
      <option value="name">Name (A–Z)</option>
      <option value="year-desc">Year (Newest)</option>
      <option value="rating-desc">Rating ↓</option>
      <option value="updated-desc">Updated ↓</option>
    </select>
  </div>

  <!-- Grid -->
  <div id="seriesGrid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-4"></div>
</div>

<!-- Modal — dynamically switches between detail and form box -->
<div class="modal-overlay" id="modal" onclick="handleOverlayClick(event)">
  <div id="modalContent"></div>
</div>

<input type="file" id="fileInput" accept=".json" style="display:none" onchange="handleImport(event)">
<script src="script.js"></script>
</body>
</html>
