<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Watchlist</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    :root {
      --accent: #d57455;
      --sand: #c3c2b7;
      --bg: #1e1e1d;
      --card-bg: #2a2a29;
      --input-bg: #242423;
      --text: #c3c2b7;
      --text-muted: #7a7970;
      --border: #333332;
      --hover-card: #313130;
    }
    body.light-mode {
      --bg: #f5f4ef;
      --card-bg: #ffffff;
      --input-bg: #ebebе6;
      --text: #2a2a27;
      --text-muted: #888880;
      --border: #deded8;
      --hover-card: #f0efe9;
    }
    * { transition: background-color 0.2s, color 0.2s; }
    body { background: var(--bg); color: var(--text); min-height: 100vh; font-family: 'Segoe UI', system-ui, sans-serif; }
    .card { background: var(--card-bg); border-radius: 16px; overflow: hidden; cursor: pointer; transition: transform 0.2s, box-shadow 0.2s, background-color 0.2s; }
    .card:hover { transform: translateY(-4px); box-shadow: 0 12px 32px rgba(0,0,0,0.25); background: var(--hover-card); }
    .poster-container { aspect-ratio: 2 / 3; }
    .input-field { background: var(--input-bg); color: var(--text); border: 1px solid var(--border); border-radius: 12px; padding: 12px 16px; width: 100%; outline: none; }
    .input-field:focus { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(213,116,85,0.15); }
    .btn-primary { background: var(--accent); color: #fff; font-weight: 600; padding: 10px 20px; border-radius: 12px; cursor: pointer; transition: opacity 0.15s, transform 0.1s; border: none; }
    .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
    .btn-secondary { background: var(--card-bg); color: var(--text); border: 1px solid var(--border); padding: 10px 20px; border-radius: 12px; cursor: pointer; transition: background 0.15s; }
    .btn-secondary:hover { background: var(--hover-card); }
    .btn-icon { background: var(--card-bg); border: 1px solid var(--border); color: var(--text); width: 42px; height: 42px; border-radius: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 0.15s; }
    .btn-icon:hover { background: var(--hover-card); }
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(4px); z-index: 50; align-items: center; justify-content: center; padding: 16px; }
    .modal-overlay.active { display: flex; }
    .modal-box { background: var(--card-bg); border-radius: 20px; width: 100%; max-width: 440px; max-height: 90vh; overflow-y: auto; padding: 28px; }
    .star-row { display: flex; gap: 4px; }
    .star-btn { font-size: 1.6rem; cursor: pointer; color: #555; transition: color 0.1s, transform 0.1s; background: none; border: none; padding: 0; }
    .star-btn.active { color: #f5c518; }
    .star-btn:hover { transform: scale(1.15); }
    .badge { font-size: 0.7rem; padding: 2px 8px; border-radius: 99px; font-weight: 600; display: inline-block; }
    .badge-finished { background: rgba(34,197,94,0.15); color: #22c55e; }
    .badge-watching { background: rgba(213,116,85,0.15); color: var(--accent); }
    .badge-movie { background: rgba(99,102,241,0.15); color: #818cf8; }
    .progress-pill { font-size: 0.72rem; color: var(--text-muted); }
    select option { background: var(--card-bg); color: var(--text); }
    .toggle-switch { position: relative; width: 44px; height: 24px; }
    .toggle-switch input { opacity: 0; width: 0; height: 0; }
    .toggle-track { position: absolute; inset: 0; background: var(--border); border-radius: 99px; cursor: pointer; transition: background 0.2s; }
    .toggle-track:before { content: ''; position: absolute; height: 18px; width: 18px; left: 3px; bottom: 3px; background: white; border-radius: 50%; transition: transform 0.2s; }
    input:checked + .toggle-track { background: var(--accent); }
    input:checked + .toggle-track:before { transform: translateX(20px); }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }
    .empty-state { text-align: center; padding: 80px 20px; color: var(--text-muted); }
    .count-badge { display: inline-block; background: rgba(213,116,85,0.15); color: var(--accent); font-size: 0.8rem; font-weight: 600; padding: 2px 10px; border-radius: 99px; margin-left: 8px; }

    /* Filter bar: search grows, dropdowns stay compact */
    .filter-bar { display: flex; gap: 12px; align-items: center; margin-bottom: 24px; flex-wrap: wrap; }
    .filter-search { flex: 1 1 260px; min-width: 0; }
    .filter-select { flex: 0 0 auto; width: 148px; }
    @media (max-width: 540px) {
      .filter-bar { flex-direction: column; }
      .filter-search, .filter-select { width: 100%; }
    }
  </style>
</head>
<body>
<div class="max-w-7xl mx-auto px-4 py-6 md:px-6">

  <!-- Header -->
  <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-8">
    <div>
      <h1 class="text-3xl font-bold" style="color: var(--text)">My Watchlist</h1>
      <p id="count" style="color: var(--text-muted); font-size:0.9rem; margin-top:2px;">Loading...</p>
    </div>
    <div class="flex flex-wrap gap-2 items-center" id="headerBtns">
      <!-- Rendered by JS -->
    </div>
  </div>

  <!-- Filters -->
  <div class="filter-bar">
    <input id="searchInput" placeholder="Search series or movies…" class="input-field filter-search" oninput="filterData()">
    <select id="categoryFilter" onchange="filterData()" class="input-field filter-select">
      <option value="">All Categories</option>
    </select>
    <select id="sortSelect" onchange="filterData()" class="input-field filter-select">
      <option value="name">Name (A–Z)</option>
      <option value="year-desc">Year (Newest)</option>
      <option value="rating-desc">Rating ↓</option>
      <option value="updated-desc">Updated ↓</option>
    </select>
  </div>

  <!-- Grid -->
  <div id="seriesGrid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-4"></div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modal" onclick="handleOverlayClick(event)">
  <div class="modal-box" id="modalContent"></div>
</div>

<input type="file" id="fileInput" accept=".json" style="display:none" onchange="handleImport(event)">

<script src="script.js"></script>
</body>
</html>
